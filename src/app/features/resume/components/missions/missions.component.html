<ng-container *transloco="let translate">
  <cv-panel id="experience" [header]="translate('cv.missions.panelTitle')">
    <div class="timeline">
      @for (mission of missions; track mission['client']; let last = $last) {
        <div class="timeline-event">
          <div class="timeline-event-opposite"></div>
          <div class="timeline-event-separator">
            <i class="pi pi-bookmark"></i>
            @if (!last) {
              <div class="timeline-event-connector"></div>
            }
          </div>
          <div class="timeline-event-content">
            <div class="mission flex flex-col p-4 mt-4 4 gap-4">
              <div class="flex flex-col">
                <span class="text-2xl font-bold mb-2 text-center mission__title">
                  {{ mission['client'] }}
                </span>
                <span class="font-normal mb-2 text-center" [style.color]="'#6c757d'">
                  {{ mission['timelapse'] }}
                </span>
              </div>
              <div class="flex flex-col pb-4 gap-4 text-start">
                <markdown [innerHTML]="mission.description"></markdown>
                <div class="mission__button">
                  <cv-slide-button
                    (click)="emitOpenMissionDialog(mission)"
                    onKeyDown="emitOpenMissionDialog({mission})"
                  ></cv-slide-button>
                </div>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  </cv-panel>
</ng-container>
